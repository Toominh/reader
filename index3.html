<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trình Đọc Sách</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Merriweather:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300;1,8..60,400&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;1,7..72,300;1,7..72,400&family=Noto+Serif:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  :root {
    --bg: #1a1916;
    --bg-page: #211f1c;
    --text: #d4cfc5;
    --text-muted: #6e6a63;
    --accent: #c4855a;
    --border: rgba(255,255,255,0.08);
    --panel: #2a2825;
    --shadow: rgba(0,0,0,0.4);
    --font-size: 28px;
    --line-height: 1.8;
    --margin-h: 80px;
  }

  body {
    background: var(--bg);
    height: 100%;
    font-family: 'Crimson Pro', Georgia, serif;
    color: var(--text);
    transition: background 0.3s, color 0.3s;
  }

  /* Input screen scrolls internally */
  #input-screen {
    height: 100%;
    overflow-y: auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .logo {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .title-main {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 42px;
    font-weight: 400;
    color: var(--text);
    text-align: center;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 16px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 48px;
    font-style: italic;
  }

  .input-card {
    background: var(--bg-page);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    width: 100%;
    max-width: 680px;
    box-shadow: 0 4px 32px var(--shadow);
  }

  .input-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: block;
  }

  #text-input {
    width: 100%;
    height: 260px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  #text-input:focus { border-color: var(--accent); }
  #text-input::placeholder { color: var(--text-muted); font-style: italic; }

  .input-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 20px 0;
  }

  .opt-group label {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 6px;
  }

  .opt-group select, .opt-group input[type=number] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 8px 10px;
    outline: none;
    cursor: pointer;
  }

  #start-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #faf7f2;
    border: none;
    border-radius: 2px;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 18px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  #start-btn:hover { opacity: 0.88; }

  /* ── READER SCREEN ── */
  #reader-screen {
    display: none;
    height: 100vh;
    flex-direction: column;
    overflow-y: auto;
  }

  /* ── PAGED MODE (default) ── */
  #reader-screen:not(.scroll-mode) {
    overflow: hidden;
  }
  #reader-screen:not(.scroll-mode) .book-wrapper {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  #reader-screen:not(.scroll-mode) .page-container {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  #reader-screen:not(.scroll-mode) #page-content {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── SCROLL MODE ── */
  #reader-screen.scroll-mode {
    overflow-y: auto;
  }
  #reader-screen.scroll-mode .book-wrapper {
    flex: none;
    padding-bottom: 80px;
  }
  #reader-screen.scroll-mode .page-container {
    flex: none;
    height: auto;
    overflow: visible;
  }
  #reader-screen.scroll-mode #page-content {
    height: auto;
    overflow: visible;
  }
  #reader-screen.scroll-mode .page-footer,
  #reader-screen.scroll-mode .progress-bar,
  #reader-screen.scroll-mode .kb-hint { display: none; }
  #reader-screen.scroll-mode #scroll-back-top { display: flex; }

  #scroll-back-top {
    display: none;
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 40px;
    height: 40px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 18px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px var(--shadow);
    z-index: 200;
    opacity: 0.85;
    transition: opacity 0.2s;
  }
  #scroll-back-top:hover { opacity: 1; }

  .view-mode-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 5px 8px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .view-mode-btn:hover { background: var(--bg); }
  .view-mode-btn.active { background: var(--accent); color: #faf7f2; border-color: var(--accent); }
  .export-btn { border-color: var(--accent); color: var(--accent); }
  .export-btn:hover { background: var(--accent); color: #faf7f2; }

  /* Toolbar */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 0;
    height: 52px;
    flex-shrink: 0;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .toolbar::-webkit-scrollbar { display: none; }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 12px;
    border-right: 1px solid var(--border);
    height: 100%;
  }
  .toolbar-group:last-child { border-right: none; margin-left: auto; }
  .toolbar-group:first-child { padding-left: 0; }

  .tb-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 6px;
    white-space: nowrap;
  }

  .tb-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 2px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--bg); border-color: var(--border); }

  .tb-val {
    font-size: 13px;
    min-width: 36px;
    text-align: center;
    color: var(--text);
  }

  .tb-select {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 4px 6px;
    cursor: pointer;
    outline: none;
    max-width: 140px;
  }

  .theme-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    transition: background 0.15s;
  }
  .theme-btn:hover { background: var(--bg); }
  .theme-btn.active { background: var(--accent); color: #faf7f2; border-color: var(--accent); }

  /* Book area */
  .book-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 20px 8px;
  }

  .page-container {
    background: var(--bg-page);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 760px;
    box-shadow: 0 2px 24px var(--shadow), 0 0 0 1px rgba(0,0,0,0.04);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Subtle page texture lines */
  .page-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent calc(var(--line-height) * var(--font-size) - 1px),
      rgba(0,0,0,0.03) calc(var(--line-height) * var(--font-size) - 1px),
      rgba(0,0,0,0.03) calc(var(--line-height) * var(--font-size))
    );
    background-size: 100% calc(var(--line-height) * var(--font-size));
    pointer-events: none;
    opacity: 0;
  }

  #page-content {
    padding: 32px var(--margin-h);
    font-size: var(--font-size);
    line-height: var(--line-height);
    color: var(--text);
  }

  #page-content p {
    margin-bottom: calc(var(--font-size) * 0.8);
    text-align: justify;
    text-indent: 1.5em;
    hyphens: auto;
  }
  #page-content p:first-child { text-indent: 0; }

  /* Drop cap on first paragraph */
  #page-content p:first-child::first-letter {
    font-size: 3.8em;
    font-weight: 500;
    float: left;
    line-height: 0.75;
    margin: 0.06em 0.08em 0 0;
    color: var(--accent);
    font-family: 'EB Garamond', Georgia, serif;
  }

  /* Pagination footer */
  .page-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px var(--margin-h);
    border-top: 1px solid var(--border);
    background: var(--bg-page);
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 15px;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn:hover:not(:disabled) { background: var(--accent); color: #faf7f2; border-color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .page-info {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .page-info strong { color: var(--text); font-weight: 500; }

  /* Progress bar */
  .progress-bar {
    height: 2px;
    background: var(--border);
    width: 100%;
    max-width: 760px;
    margin-top: 12px;
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.3s ease;
  }

  #back-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 13px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #back-btn:hover { color: var(--text); border-color: var(--text-muted); }

  /* ── THEMES ── */
  body.theme-sepia {
    --bg: #f2ead8; --bg-page: #f9f4e8; --text: #3d2b1f;
    --text-muted: #8a7460; --accent: #7a4030; --border: rgba(0,0,0,0.10);
    --panel: #e8dfc8; --shadow: rgba(50,30,10,0.12);
  }
  body.theme-dark {
    --bg: #1a1916; --bg-page: #211f1c; --text: #d4cfc5;
    --text-muted: #6e6a63; --accent: #c4855a; --border: rgba(255,255,255,0.08);
    --panel: #2a2825; --shadow: rgba(0,0,0,0.4);
  }
  body.theme-light {
    --bg: #f0f0f0; --bg-page: #ffffff; --text: #1a1a1a;
    --text-muted: #666; --accent: #5a6fa8; --border: rgba(0,0,0,0.1);
    --panel: #e8e8e8; --shadow: rgba(0,0,0,0.08);
  }
  body.theme-night {
    --bg: #0f1117; --bg-page: #161b22; --text: #b8c0cc;
    --text-muted: #4a5568; --accent: #4a90d9; --border: rgba(255,255,255,0.06);
    --panel: #1c2128; --shadow: rgba(0,0,0,0.5);
  }

  /* Page turn animation */
  .page-container.turning {
    animation: pageTurn 0.25s ease;
  }
  @keyframes pageTurn {
    0% { opacity: 1; transform: translateX(0); }
    50% { opacity: 0.3; transform: translateX(-8px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  /* Keyboard hint */
  .kb-hint {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 16px;
    letter-spacing: 0.05em;
    opacity: 0.7;
  }

  @media (max-width: 600px) {
    #page-content { padding: 20px 16px; }
    .page-footer { padding: 10px 16px; }
    .toolbar { padding: 0 6px; height: 48px; }
    .toolbar-group { padding: 0 6px; }
    .tb-label { display: none; }
    .tb-btn { padding: 4px 6px; font-size: 13px; }
    .tb-val { min-width: 26px; font-size: 12px; }
    .tb-select { max-width: 90px; font-size: 12px; padding: 3px 4px; }
    .theme-btn { padding: 4px 6px; font-size: 12px; }
    .view-mode-btn { padding: 4px 6px; font-size: 11px; }
    #back-btn { font-size: 12px; padding: 4px 8px; }
    .input-options { grid-template-columns: 1fr; }
    .book-wrapper { padding: 10px 8px 6px; }
  }
</style>
</head>
<body class="theme-dark">

<!-- INPUT SCREEN -->
<div id="input-screen">
  <div class="logo">&#9758; Trình đọc văn bản</div>
  <h1 class="title-main">Nhập nội dung<br>để bắt đầu đọc</h1>
  <p class="subtitle">Dán văn bản vào khung bên dưới, chọn font và bắt đầu</p>

  <div class="input-card">
    <label class="input-label">Nội dung văn bản</label>
    <textarea id="text-input" placeholder="Dán hoặc gõ văn bản vào đây…

Bạn có thể nhập bất kỳ nội dung nào: truyện, bài báo, tài liệu học tập, hay bất cứ thứ gì bạn muốn đọc một cách thoải mái.

Sau đó hệ thống sẽ tự động phân trang và trình bày như một cuốn sách điện tử."></textarea>

    <div class="input-options">
      <div class="opt-group" style="grid-column: 1 / -1;">
        <label>Font chữ</label>
        <select id="init-font">
          <option value="'Crimson Pro', Georgia, serif">Crimson Pro (Cổ điển)</option>
          <option value="'Lora', Georgia, serif">Lora (Tinh tế)</option>
          <option value="'Merriweather', Georgia, serif">Merriweather (Dễ đọc)</option>
          <option value="'EB Garamond', Georgia, serif">EB Garamond (Cổ thư)</option>
          <option value="'Source Serif 4', Georgia, serif">Source Serif 4 (Hiện đại)</option>
          <option value="'Literata', Georgia, serif">Literata (E-reader)</option>
          <option value="'Noto Serif', Georgia, serif">Noto Serif (Đa ngôn ngữ)</option>
          <option value="Georgia, serif">Georgia (Phổ thông)</option>
        </select>
      </div>
    </div>

    <button id="start-btn" onclick="startReading()">Bắt đầu đọc →</button>
  </div>
</div>

<!-- READER SCREEN -->
<div id="reader-screen">

  <!-- Scroll to top button (scroll mode only) -->
  <button id="scroll-back-top" onclick="document.getElementById('reader-screen').scrollTo({top:0,behavior:'smooth'})" title="Lên đầu">↑</button>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-group">
      <button id="back-btn" onclick="backToInput()">← Nhập lại</button>
    </div>

    <div class="toolbar-group">
      <span class="tb-label">Font</span>
      <select class="tb-select" id="font-select" onchange="changeFont(this.value)">
        <option value="'Crimson Pro', Georgia, serif">Crimson Pro</option>
        <option value="'Lora', Georgia, serif">Lora</option>
        <option value="'Merriweather', Georgia, serif">Merriweather</option>
        <option value="'EB Garamond', Georgia, serif">EB Garamond</option>
        <option value="'Source Serif 4', Georgia, serif">Source Serif 4</option>
        <option value="'Literata', Georgia, serif">Literata</option>
        <option value="'Noto Serif', Georgia, serif">Noto Serif</option>
        <option value="Georgia, serif">Georgia</option>
      </select>
    </div>

    <div class="toolbar-group">
      <span class="tb-label">Cỡ</span>
      <button class="tb-btn" onclick="adjFont(-1)">A−</button>
      <span class="tb-val" id="font-val">28</span>
      <button class="tb-btn" onclick="adjFont(1)">A+</button>
    </div>

    <div class="toolbar-group">
      <span class="tb-label">Dòng</span>
      <button class="tb-btn" onclick="adjLine(-0.1)">↕−</button>
      <span class="tb-val" id="line-val">1.8</span>
      <button class="tb-btn" onclick="adjLine(0.1)">↕+</button>
    </div>

    <div class="toolbar-group">
      <span class="tb-label">Lề</span>
      <button class="tb-btn" onclick="adjMargin(-10)">←→</button>
      <span class="tb-val" id="margin-val">80</span>
      <button class="tb-btn" onclick="adjMargin(10)">→←</button>
    </div>

    <div class="toolbar-group">
      <button class="theme-btn" onclick="setTheme('theme-paper')" title="Giấy">☀</button>
      <button class="theme-btn" onclick="setTheme('theme-sepia')" title="Sepia">🌤</button>
      <button class="theme-btn active" onclick="setTheme('theme-dark')" title="Tối">🌙</button>
      <button class="theme-btn" onclick="setTheme('theme-night')" title="Đêm">⭐</button>
      <button class="theme-btn" onclick="setTheme('theme-light')" title="Sáng">◎</button>
    </div>

    <div class="toolbar-group">
      <button class="view-mode-btn" id="btn-paged" onclick="setViewMode('paged')" title="Đọc phân trang">⧉ Trang</button>
      <button class="view-mode-btn active" id="btn-scroll" onclick="setViewMode('scroll')" title="Xem toàn bộ">☰ Toàn bộ</button>
    </div>

    <div class="toolbar-group">
      <button class="view-mode-btn export-btn" onclick="exportPDF()" title="Xuất PDF">⬇ PDF</button>
    </div>
  </div>

  <!-- Book -->
  <div class="book-wrapper">
    <div class="page-container" id="page-box">
      <div id="page-content"></div>
      <div class="page-footer">
        <button class="nav-btn" id="prev-btn" onclick="prevPage()">← Trước</button>
        <div class="page-info">
          Trang <strong id="cur-page">1</strong> / <strong id="total-pages">1</strong>
        </div>
        <button class="nav-btn" id="next-btn" onclick="nextPage()">Tiếp →</button>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="kb-hint">Phím ← → hoặc Space để lật trang</div>
  </div>
</div>

<script>
let viewMode = 'paged'; // 'paged' | 'scroll'
let fullText = '';

function setViewMode(mode) {
  viewMode = mode;
  const reader = document.getElementById('reader-screen');
  const btnPaged = document.getElementById('btn-paged');
  const btnScroll = document.getElementById('btn-scroll');

  if (mode === 'scroll') {
    reader.classList.add('scroll-mode');
    btnScroll.classList.add('active');
    btnPaged.classList.remove('active');
    renderScrollMode();
    reader.scrollTop = 0;
  } else {
    reader.classList.remove('scroll-mode');
    btnPaged.classList.add('active');
    btnScroll.classList.remove('active');
    reader.scrollTop = 0;
    renderPage(currentPage);
  }
}

function renderScrollMode() {
  const content = document.getElementById('page-content');
  // Render all paragraphs from all pages
  const allParas = pages.flat();
  content.innerHTML = allParas.map(p => `<p>${escapeHtml(p)}</p>`).join('');
}

let currentPage = 0;
let fontSize = 28;
let lineHeight = 1.8;
let marginH = 80;
let currentFont = "'Crimson Pro', Georgia, serif";
let wordsPerPage = 200;

function splitIntoPages(text, wpg) {
  const paragraphs = text.split(/\n+/).map(p => p.trim()).filter(p => p.length > 0);
  const result = [];
  let currentParagraphs = [];
  let wordCount = 0;

  for (const para of paragraphs) {
    const words = para.split(/\s+/).length;
    if (wordCount + words > wpg && currentParagraphs.length > 0) {
      result.push(currentParagraphs.slice());
      currentParagraphs = [para];
      wordCount = words;
    } else {
      currentParagraphs.push(para);
      wordCount += words;
    }
  }
  if (currentParagraphs.length > 0) result.push(currentParagraphs);
  return result;
}

function renderPage(idx) {
  const content = document.getElementById('page-content');
  const pageBox = document.getElementById('page-box');

  pageBox.classList.remove('turning');
  void pageBox.offsetWidth;
  pageBox.classList.add('turning');

  content.innerHTML = pages[idx].map(p => `<p>${escapeHtml(p)}</p>`).join('');

  document.getElementById('cur-page').textContent = idx + 1;
  document.getElementById('total-pages').textContent = pages.length;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === pages.length - 1;

  const pct = pages.length > 1 ? (idx / (pages.length - 1)) * 100 : 100;
  document.getElementById('progress-fill').style.width = Math.round(pct) + '%';
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function startReading() {
  const text = document.getElementById('text-input').value.trim();
  if (!text) { document.getElementById('text-input').focus(); return; }

  currentFont = document.getElementById('init-font').value;

  // Use dynamic page sizing based on viewport
  wordsPerPage = estimateWordsPerPage();
  pages = splitIntoPages(text, wordsPerPage);
  currentPage = 0;

  applyStyles();
  document.getElementById('font-select').value = currentFont;
  document.getElementById('font-val').textContent = fontSize;
  document.getElementById('line-val').textContent = lineHeight.toFixed(1);
  document.getElementById('margin-val').textContent = marginH;

  // Set dark theme button active
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.theme-btn[title="Tối"]').classList.add('active');

  document.getElementById('input-screen').style.display = 'none';
  document.getElementById('reader-screen').style.display = 'flex';

  // Default to scroll mode
  viewMode = 'scroll';
  document.getElementById('reader-screen').classList.add('scroll-mode');
  document.getElementById('btn-scroll').classList.add('active');
  document.getElementById('btn-paged').classList.remove('active');

  renderScrollMode();
}

function estimateWordsPerPage() {
  // Estimate how many words fit in the visible area
  const toolbarH = 52;
  const footerH = 56;
  const progressH = 24;
  const hintH = 28;
  const paddingV = 32 * 2; // top+bottom padding of page-content
  const availH = window.innerHeight - toolbarH - footerH - progressH - hintH - 16*2 - paddingV;
  const lineH = fontSize * lineHeight;
  const lines = Math.floor(availH / lineH);

  const availW = Math.min(760, window.innerWidth - 40) - marginH * 2;
  const charsPerLine = Math.floor(availW / (fontSize * 0.5));
  const wordsPerLine = charsPerLine / 5.5;
  return Math.max(80, Math.floor(lines * wordsPerLine * 0.85));
}

function backToInput() {
  document.getElementById('reader-screen').style.display = 'none';
  document.getElementById('input-screen').style.display = 'flex';
}

function applyStyles() {
  const root = document.documentElement;
  root.style.setProperty('--font-size', fontSize + 'px');
  root.style.setProperty('--line-height', lineHeight);
  root.style.setProperty('--margin-h', marginH + 'px');
  document.getElementById('page-content').style.fontFamily = currentFont;
}

function adjFont(d) {
  fontSize = Math.max(12, Math.min(32, fontSize + d));
  document.getElementById('font-val').textContent = fontSize;
  applyStyles();
}

function adjLine(d) {
  lineHeight = Math.max(1.2, Math.min(3.0, Math.round((lineHeight + d) * 10) / 10));
  document.getElementById('line-val').textContent = lineHeight.toFixed(1);
  applyStyles();
}

function adjMargin(d) {
  marginH = Math.max(16, Math.min(160, marginH + d));
  document.getElementById('margin-val').textContent = marginH;
  applyStyles();
}

function changeFont(val) {
  currentFont = val;
  applyStyles();
}

function setTheme(t) {
  document.body.className = t;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function nextPage() {
  if (currentPage < pages.length - 1) {
    currentPage++;
    renderPage(currentPage);
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    renderPage(currentPage);
  }
}

function getThemeColors() {
  const themes = {
    'theme-dark':  { bg: '#1a1916', bgPage: '#211f1c', text: '#d4cfc5', accent: '#c4855a' },
    'theme-night': { bg: '#0f1117', bgPage: '#161b22', text: '#b8c0cc', accent: '#4a90d9' },
    'theme-sepia': { bg: '#f2ead8', bgPage: '#f9f4e8', text: '#3d2b1f', accent: '#7a4030' },
    'theme-light': { bg: '#f0f0f0', bgPage: '#ffffff', text: '#1a1a1a', accent: '#5a6fa8' },
    'theme-paper': { bg: '#f5f0e8', bgPage: '#faf7f2', text: '#2c2520', accent: '#8b4a2f' },
  };
  const cls = [...document.body.classList].find(c => themes[c]);
  return themes[cls] || themes['theme-light'];
}

function exportPDF() {
  const allParas = pages.flat();
  if (!allParas.length) return;

  const colors = getThemeColors();
  const fontFaceUrl = "https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Merriweather:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300;1,8..60,400&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;1,7..72,300;1,7..72,400&family=Noto+Serif:ital,wght@0,400;0,500;1,400&display=swap";
  const marginMm = Math.max(8, Math.min(18, Math.round(marginH * 0.15)));

  const paragraphsHTML = allParas
    .map((p, i) => `<p class="${i === 0 ? 'first-p' : ''}">${escapeHtml(p)}</p>`)
    .join('\n');

  const printWin = window.open('', '_blank');
  if (!printWin) {
    alert('Trình duyệt chặn pop-up. Vui lòng cho phép pop-up và thử lại.');
    return;
  }

  printWin.document.write(`<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="${fontFaceUrl}" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @page {
    size: A4;
    margin: ${marginMm}mm ${marginMm + 2}mm;
  }

  html, body {
    background: ${colors.bgPage};
    color: ${colors.text};
    font-family: ${currentFont};
    font-size: ${fontSize}px;
    line-height: ${lineHeight};
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  p {
    margin-bottom: ${(fontSize * 0.75).toFixed(1)}px;
    text-align: justify;
    text-indent: 1.5em;
    hyphens: auto;
    orphans: 3;
    widows: 3;
  }
  p.first-p { text-indent: 0; }
  p.first-p::first-letter {
    font-size: 3.4em;
    font-weight: 500;
    float: left;
    line-height: 0.78;
    margin: 0.05em 0.08em 0 0;
    color: ${colors.accent};
    font-family: 'EB Garamond', Georgia, serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  @media print {
    html, body { background: ${colors.bgPage} !important; }
  }
</style>
</head>
<body>
${paragraphsHTML}
<script>
  // Wait for fonts then print
  document.fonts.ready.then(() => {
    setTimeout(() => { window.print(); }, 300);
  });
<\/script>
</body>
</html>`);
  printWin.document.close();
}

document.addEventListener('keydown', e => {
  if (document.getElementById('reader-screen').style.display === 'none') return;
  if (viewMode === 'scroll') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
});

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (document.getElementById('reader-screen').style.display === 'none') return;
  if (viewMode === 'scroll') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) { dx < 0 ? nextPage() : prevPage(); }
});
</script>
</body>
</html>
